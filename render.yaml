services:
  # Backend Django Web Service
  - type: web
    name: notes-backend
    env: docker
    rootDir: backend
    dockerContext: backend
    dockerfilePath: Dockerfile
    plan: free
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DB_HOST
        fromDatabase:
          name: notes-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: notes-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: notes-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: notes-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: notes-db
          property: password

  # Frontend Vite Static Site
  - type: static
    name: notes-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    plan: free
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: notes-backend
          property: host
        # Since static sites build on CDN, they need to know the backend URL at build time.
        # Render will resolve notes-backend's host and pass it here.

databases:
  - name: notes-db
    plan: free
